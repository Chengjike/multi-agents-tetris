version: '3.8'

services:
  tetris:
    build: .
    ports:
      - "80:80"  # HTTP + WebSocket 端口
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
version: '3.8'

services:
  tetris:
    build: .
    ports:
      - "8766:8766"  # 俄罗斯方块服务端口
      - "80:80"      # HTTP 端口
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/api/game/status"]
      interval: 30s
      timeout: 10s
      retries: 3